<html lang="en">

    <title>Title</title>
</head>
<body>
<form id="f1" method="post">
    {% csrf_token %}
    <table border="1">

     <input type="submit" value="submit">

    <ul class="messages">
        {% for message in messages %}
            <li {% if message.tags %} class="{{ message.tags }}"{% endif %}> {{ message }}</li>
        {% endfor %}

    </ul>
{% endif %}

    <table border="1">
    <tr>
        <th>village Name</th>
    </tr>
    {% for obj in vlg_list %}

        <td>{{obj.village}}</td>
        <td><a href="{% url 'up_vlg' obj.id %}"> UPDATE </a> </td>
        <td><a href="{% url 'dele_vlg' obj.id %}"> DELETE</a></td>

    </tr>
     {% endfor %}
</table>
</form>
</body>
</html>
