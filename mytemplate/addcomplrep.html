<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form id="f1" method="post"  >
    {% csrf_token %}
    <table border="1">
        <tr><td>REPLY</td><td><textarea name="reply"></textarea></td></tr>
        <td><input type="hidden" name="cid" value="{{cid}}" ></td>
        </table>

     <input type="submit" value="send">
        {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li {% if message.tags %} class="{{ message.tags }}"{% endif %}> {{ message }}</li>
        {% endfor %}

    </ul>
    {% endif %}

</form>
</body>
</html>
